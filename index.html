<body>
  <header class="hero"><a class="merchant-link" href="comerciantes.html">Área do comerciante</a><div class="hero-shade"><div class="hero-content container"><img class="brand-logo hero-logo" src="imagens/logo.png" alt="Logo Busca Salto" /><h1>Busca Salto</h1><p class="hero-kicker">Tudo o que você procura em Salto, em um só lugar.</p><p class="subtitle">Encontre comércios, serviços e profissionais da cidade.</p><section class="search-panel hero-search"><div class="actions"><input id="searchInput" class="search-input" type="search" placeholder="O que você procura em Salto?" aria-label="Buscar comércios" /><div class="category-picker"><input id="categoryFilter" type="hidden" value="" /><button id="categoryButton" class="category-button" type="button" aria-haspopup="true" aria-expanded="false"><span>Todas as categorias</span><span aria-hidden="true">⌄</span></button><div id="categoryMenu" class="category-menu" role="menu" hidden></div></div><select id="bairroFilter" aria-label="Filtrar por bairro"><option value="">Todos os bairros</option></select><button id="searchButton" class="btn-search" type="button">Pesquisar</button><button id="clearFilters" class="btn-clear" type="button">Limpar filtros</button></div></section></div></div></header>
  <main class="container"><p id="status" class="status">Carregando comércios...</p><section id="results" class="grid" aria-live="polite"></section></main>
  <footer class="container">Busca Salto - o buscador local da cidade.</footer>
  <script>
    const API_URL="/api/comercios";
    const PAGE_LIMIT=30;
    const BUSCA_SALTO_WHATSAPP="5511953116573";
    const UI_TEXTS={loading:"Carregando comércios...",loadError:"Não foi possível carregar os dados agora. Tente novamente em instantes.",emptyInitial:"Digite o que você procura ou explore as categorias e bairros.",emptyResult:"Nenhum resultado encontrado para os filtros selecionados."};
    const dom={searchInput:document.getElementById("searchInput"),categoryFilter:document.getElementById("categoryFilter"),categoryButton:document.getElementById("categoryButton"),categoryMenu:document.getElementById("categoryMenu"),bairroFilter:document.getElementById("bairroFilter"),searchButton:document.getElementById("searchButton"),clearFilters:document.getElementById("clearFilters"),status:document.getElementById("status"),results:document.getElementById("results")};
    let categoryGroupsData=[],categorySearchTerm="";
    let allItems=[],currentPage=1,currentTotal=0,currentHasMore=false,currentSeed="",searchTimer=null,currentController=null;
    const normalize=(value="")=>value.toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
    function sanitizeWhatsApp(value=""){return value.replace(/\D/g,"")}
    function toInstagramUrl(value=""){const v=value.trim();if(!v)return"";if(v.startsWith("http://")||v.startsWith("https://"))return v;if(v.startsWith("@"))return`https://instagram.com/${v.slice(1)}`;return`https://instagram.com/${v}`}
    function toFacebookUrl(value=""){const v=value.trim();if(!v)return"";if(v.startsWith("http://")||v.startsWith("https://"))return v;return`https://facebook.com/${encodeURIComponent(v.replace(/^@/,""))}`}
    function toSiteUrl(value=""){const v=value.trim();if(!v)return"";if(v.startsWith("http://")||v.startsWith("https://"))return v;return`https://${v}`}
    function toPhoneUrl(value=""){const digits=value.replace(/\D/g,"");return digits?`tel:${digits}`:""}
    function toMapsUrl(value="",city=""){const address=value.trim();if(!address)return"";const query=city?`${address}, ${city}, Salto/SP`:`${address}, Salto/SP`;return`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`}
    function contactUrl(type,value){if(type==="whatsapp"){const digits=sanitizeWhatsApp(value);return digits?`https://wa.me/${digits}`:""}if(type==="telefone")return toPhoneUrl(value);if(type==="instagram")return toInstagramUrl(value);if(type==="facebook")return toFacebookUrl(value);if(type==="site")return toSiteUrl(value);return""}
    function buttonIcon(type){const icons={whatsapp:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19l1.1-3.8A7.6 7.6 0 1 1 9 18.1L5 19Z"/><path d="M9.5 8.8c.2-.4.4-.4.7-.4h.5c.2 0 .4.1.5.4l.7 1.6c.1.3.1.5-.1.7l-.4.5c-.1.2-.2.3-.1.5.4.8 1.1 1.5 2 2 .2.1.3.1.5-.1l.6-.7c.2-.2.4-.2.7-.1l1.5.7c.3.1.4.3.4.6 0 .7-.4 1.4-1 1.6-1.2.4-3.8-.5-5.6-2.3-1.8-1.8-2.7-4.3-2.3-5.5Z"/></svg>',telefone:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.9v2.7a2 2 0 0 1-2.2 2 19.6 19.6 0 0 1-8.5-3 19.2 19.2 0 0 1-5.9-5.9 19.6 19.6 0 0 1-3-8.5A2 2 0 0 1 4.4 2h2.7a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.8a2 2 0 0 1-.4 2.1L8.3 9.7a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/></svg>',instagram:'<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><path d="M17.5 6.5h.01"/></svg>',facebook:'<span class="btn-icon brand-letter" aria-hidden="true">f</span>',site:'<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></svg>',endereco:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>'};const icon=icons[type]||"";return icon.startsWith("<span")?icon:`<span class="btn-icon">${icon}</span>`}
    function actionButton(type,href,label,options={}){const content=`${buttonIcon(type)}<span>${label}</span>`;if(!href)return`<span class="btn ${type} disabled" aria-disabled="true" title="${label} indisponível">${content}</span>`;const target=options.sameTab?"":' target="_blank" rel="noopener"';return`<a class="btn ${type}" href="${href}"${target}>${content}</a>`}
    function contactButton(type,item,label,options={}){const content=`${buttonIcon(type)}<span>${label}</span>`;if(!item[`has_${type}`])return`<span class="btn ${type} disabled" aria-disabled="true" title="${label} indisponível">${content}</span>`;const sameTab=options.sameTab?"1":"0";return`<button class="btn ${type}" type="button" data-contact-type="${type}" data-id="${item.id}" data-same-tab="${sameTab}">${content}</button>`}
    function normalizarPlano(plano){const p=String(plano||"").toLowerCase().trim();return["top","destaque","parceiro","gratuito"].includes(p)?p:"gratuito"}
    function escapeOption(value=""){return String(value).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
    function renderCategoryMenu(){const term=normalize(categorySearchTerm);const grupos=categoryGroupsData.map(group=>{const categoryMatch=normalize(group.categoria).includes(term),subs=(group.subcategorias||[]).filter(sub=>!term||categoryMatch||normalize(sub).includes(term));return{...group,subcategorias:subs,show:!term||categoryMatch||subs.length}}).filter(group=>group.show);const groupHtml=grupos.map(group=>`<div class="category-group"><button class="category-choice is-category" type="button" data-category="${escapeOption(group.categoria)}">${escapeOption(group.categoria)}</button>${(group.subcategorias||[]).map(sub=>`<button class="category-choice" type="button" data-category="${escapeOption(sub)}">${escapeOption(sub)}</button>`).join("")}</div>`).join("");const empty='<div class="category-empty">Nenhuma categoria encontrada.</div>';dom.categoryMenu.innerHTML=`<div class="category-menu-tools"><input id="categoryMenuSearch" class="category-menu-search" type="search" placeholder="Buscar categoria ou subcategoria" aria-label="Buscar categoria ou subcategoria" value="${escapeOption(categorySearchTerm)}" /></div><div class="category-menu-list">${groupHtml||empty}</div>`;dom.categoryMenu.querySelectorAll(".category-choice").forEach(button=>button.classList.toggle("is-active",button.dataset.category===dom.categoryFilter.value))}
    function renderFiltersData(filters){const grupos=filters?.categoriasAgrupadas||[],categories=filters?.categorias||[],bairros=filters?.bairros||[];categoryGroupsData=grupos.length?grupos:categories.map(c=>({categoria:c,subcategorias:[]}));renderCategoryMenu();dom.bairroFilter.innerHTML='<option value="">Todos os bairros</option>'+bairros.map(b=>`<option value="${escapeOption(b)}">${escapeOption(b)}</option>`).join("")}
    function closeCategoryMenu(){dom.categoryMenu.hidden=true;dom.categoryButton.setAttribute("aria-expanded","false")}
    function updateCategoryMenuPosition(){const rect=dom.categoryButton.getBoundingClientRect(),top=Math.min(rect.bottom+8,window.innerHeight-120);dom.categoryMenu.style.setProperty("--category-menu-top",`${Math.max(10,top)}px`)}
    function toggleCategoryMenu(){const willOpen=dom.categoryMenu.hidden;if(willOpen)updateCategoryMenuPosition();dom.categoryMenu.hidden=!willOpen;dom.categoryButton.setAttribute("aria-expanded",String(willOpen));if(willOpen)setTimeout(()=>dom.categoryMenu.querySelector(".category-menu-search")?.focus(),0)}
    function setCategoryFilter(value=""){dom.categoryFilter.value=value;dom.categoryButton.querySelector("span").textContent=value||"Todas as categorias";dom.categoryMenu.querySelectorAll(".category-choice").forEach(button=>button.classList.toggle("is-active",button.dataset.category===value));trackEvent("category_select",{categoria:value});closeCategoryMenu();fetchResults({reset:true})}
    function badgeHTML(item){const plan=normalizarPlano(item.plano),tags=[];if(plan==="parceiro")tags.push('<span class="tag plano parceiro">Parceiro Busca Salto</span>');if(plan==="destaque")tags.push('<span class="tag plano destaque">Destaque Busca Salto</span>');if(plan==="top")tags.push('<span class="tag plano top">Top Categoria</span>');return tags.join("")}
    function cardClassByPlan(plan=""){return`card-plano-${normalizarPlano(plan)}`}
    function renderCards(items){if(!items.length){dom.results.innerHTML=`<div class="empty">${UI_TEXTS.emptyResult}</div>`;dom.status.textContent="0 resultados";return}const renderCard=item=>{const plano=normalizarPlano(item.plano),enderecoUrl=toMapsUrl(item.endereco||"",item.bairro||""),mostrarImagemGrande=plano!=="gratuito",mostrarOferta=plano==="top"||plano==="destaque",descricao=item.descricao?.trim(),descricaoCurta=descricao&&plano==="gratuito"?`${descricao.slice(0,120)}${descricao.length>120?"...":""}`:descricao,claimMessage=encodeURIComponent(`Olá, sou responsável pelo comércio ${item.nome} e gostaria de corrigir ou melhorar este cadastro no Busca Salto.`),primaryButtons=[contactButton("whatsapp",item,"WhatsApp"),contactButton("telefone",item,"Telefone",{sameTab:true})].join(""),secondaryButtons=[contactButton("instagram",item,"Instagram"),contactButton("facebook",item,"Facebook"),contactButton("site",item,"Site")].join(""),addressButton=actionButton("endereco",enderecoUrl,"Endereço"),buttonStack=`<div class="button-stack"><div class="button-row primary-actions">${primaryButtons}</div><div class="button-row secondary-actions">${secondaryButtons}</div><div class="button-row address-actions">${addressButton}</div></div>`;return `<article class="card ${cardClassByPlan(plano)}">${mostrarImagemGrande?`<div class="card-top">${item.foto_url?.trim()?`<img src="${item.foto_url}" alt="Foto de ${item.nome}" loading="lazy" />`:`<div class="no-photo">Busca Salto</div>`}</div>`:""}<div class="card-body"><div class="title-row"><h2>${item.nome||"Sem nome"}</h2></div><div class="tags">${badgeHTML(item)}</div><p class="meta"><strong>${item.categoria||"Categoria não informada"}</strong>${item.subcategoria?` • ${item.subcategoria}`:""}</p><p class="meta">📍 ${item.bairro||"Bairro não informado"}</p>${item.endereco?`<p class="meta">${item.endereco}</p>`:""}${descricaoCurta?`<p class="desc">${descricaoCurta}</p>`:""}${mostrarOferta&&item.oferta?`<p class="offer">🎁 ${item.oferta}</p>`:""}${buttonStack}<a class="btn-claim" href="https://wa.me/${BUSCA_SALTO_WHATSAPP}?text=${claimMessage}" target="_blank" rel="noopener">Sou responsável por este comércio</a></div></article>`};const parceiros=items.filter(item=>normalizarPlano(item.plano)!=="gratuito"),gratuitos=items.filter(item=>normalizarPlano(item.plano)==="gratuito"),grupos=[];if(parceiros.length)grupos.push(`<section><h3 class="group-title">Comércios parceiros</h3><div class="card-grid">${parceiros.map(renderCard).join("")}</div></section>`);if(gratuitos.length)grupos.push(`<section><h3 class="group-title">Cadastro gratuito</h3><div class="card-grid">${gratuitos.map(renderCard).join("")}</div></section>`);dom.results.innerHTML=grupos.join("");appendLoadMoreButton()}
    function hasActiveFilters(){return Boolean(dom.searchInput.value.trim()||dom.categoryFilter.value||dom.bairroFilter.value)}
    function updateStatus(){if(!hasActiveFilters()){dom.status.textContent="";return}dom.status.textContent=`${allItems.length} de ${currentTotal} resultado${currentTotal!==1?"s":""} encontrado${currentTotal!==1?"s":""}.`}
    function appendLoadMoreButton(){if(!currentHasMore)return;const button=document.createElement("button");button.type="button";button.className="btn-clear";button.textContent="Carregar mais";button.addEventListener("click",()=>{currentPage+=1;fetchResults({reset:false})});dom.results.appendChild(button)}
    function createSearchSeed(){return`${Date.now()}-${Math.random().toString(36).slice(2,8)}`}
    function trackEvent(event,payload={}){try{navigator.sendBeacon?.("/api/metricas",new Blob([JSON.stringify({event,payload,path:location.pathname})],{type:"application/json"}))}catch(error){}}
    function buildQuery(page){const params=new URLSearchParams({page:String(page),limit:String(PAGE_LIMIT)});const busca=dom.searchInput.value.trim(),categoria=dom.categoryFilter.value,bairro=dom.bairroFilter.value;if(currentSeed)params.set("seed",currentSeed);if(busca)params.set("busca",busca);if(categoria)params.set("categoria",categoria);if(bairro)params.set("bairro",bairro);return params.toString()}
    async function fetchResults({reset=true}={}){if(currentController)currentController.abort();currentController=new AbortController();if(reset){currentPage=1;allItems=[];currentSeed=createSearchSeed();trackEvent("search",{busca:dom.searchInput.value.trim(),categoria:dom.categoryFilter.value,bairro:dom.bairroFilter.value})}dom.status.textContent=UI_TEXTS.loading;try{const res=await fetch(`${API_URL}?${buildQuery(currentPage)}`,{cache:"no-store",signal:currentController.signal});if(!res.ok)throw new Error("Falha de rede");const data=await res.json();if(data.seed)currentSeed=data.seed;const incoming=(data.items||[]).map(item=>({...item,plano:item.tipo_exibicao||item.plano||"gratuito"}));allItems=reset?incoming:[...allItems,...incoming];currentTotal=Number(data.total)||0;currentHasMore=Boolean(data.hasMore);renderCards(allItems);updateStatus()}catch(error){if(error.name==="AbortError")return;dom.results.innerHTML=`<div class="empty">${UI_TEXTS.loadError}</div>`;dom.status.textContent=UI_TEXTS.loadError}}
    async function loadFilters(){const res=await fetch(`${API_URL}?mode=filters`,{cache:"no-store"});if(!res.ok)throw new Error("Falha de rede");const data=await res.json();renderFiltersData(data.filters)}
    async function openContact(button){const id=button.dataset.id,type=button.dataset.contactType;if(!id||!type)return;trackEvent("contact_click",{id,tipo:type});button.disabled=true;const oldText=button.innerHTML;const sameTab=button.dataset.sameTab==="1";const pendingWindow=sameTab?null:window.open("","_blank");try{const res=await fetch(`${API_URL}?mode=contact&id=${encodeURIComponent(id)}&tipo=${encodeURIComponent(type)}`,{cache:"no-store"});if(!res.ok)throw new Error("Falha de rede");const data=await res.json();const url=contactUrl(type,data.valor||"");if(!url)throw new Error("Contato indisponível");if(sameTab)window.location.href=url;else if(pendingWindow){pendingWindow.opener=null;pendingWindow.location.href=url}else window.open(url,"_blank","noopener")}catch(error){if(pendingWindow)pendingWindow.close();button.classList.add("disabled");button.title="Contato indisponível"}finally{button.disabled=false;button.innerHTML=oldText}}
    function scheduleSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>fetchResults({reset:true}),450)}
    async function loadData(){try{dom.status.textContent=UI_TEXTS.loading;await loadFilters();await fetchResults({reset:true})}catch(error){dom.results.innerHTML=`<div class="empty">${UI_TEXTS.loadError}</div>`;dom.status.textContent=UI_TEXTS.loadError}}
    dom.searchInput.addEventListener("input",scheduleSearch);dom.searchButton.addEventListener("click",()=>fetchResults({reset:true}));dom.searchInput.addEventListener("keydown",event=>{if(event.key==="Enter")fetchResults({reset:true})});dom.categoryButton.addEventListener("click",toggleCategoryMenu);dom.categoryMenu.addEventListener("input",event=>{if(event.target.matches(".category-menu-search")){categorySearchTerm=event.target.value;renderCategoryMenu();const input=dom.categoryMenu.querySelector(".category-menu-search");input?.focus();input?.setSelectionRange(categorySearchTerm.length,categorySearchTerm.length)}});dom.categoryMenu.addEventListener("click",event=>{const button=event.target.closest("button[data-category]");if(button)setCategoryFilter(button.dataset.category||"")});document.addEventListener("click",event=>{if(!event.target.closest(".category-picker"))closeCategoryMenu()});document.addEventListener("keydown",event=>{if(event.key==="Escape")closeCategoryMenu()});dom.bairroFilter.addEventListener("change",()=>fetchResults({reset:true}));dom.clearFilters.addEventListener("click",()=>{dom.searchInput.value="";dom.categoryFilter.value="";categorySearchTerm="";dom.categoryButton.querySelector("span").textContent="Todas as categorias";renderCategoryMenu();dom.bairroFilter.value="";closeCategoryMenu();fetchResults({reset:true})});dom.results.addEventListener("click",event=>{const button=event.target.closest("button[data-contact-type]");if(button)openContact(button)});trackEvent("page_view",{});loadData();
  </script>
  <script>
    (() => {
      const banner = document.getElementById("installBanner");
      const installButton = document.getElementById("installButton");
      const dismissButton = document.getElementById("installDismiss");
      const installTitle = document.getElementById("installTitle");
      const installText = document.getElementById("installText");
      let deferredPrompt = null;

      const isStandalone =
        window.matchMedia("(display-mode: standalone)").matches ||
        window.navigator.standalone === true;
      const isiOS =
        /iphone|ipad|ipod/i.test(window.navigator.userAgent) ||
        (window.navigator.platform === "MacIntel" && window.navigator.maxTouchPoints > 1);
      const wasDismissed = window.localStorage.getItem("buscaSaltoInstallDismissed") === "1";

      function hideInstallBanner() {
        if (banner) {
          banner.hidden = true;
        }
      }

      function showInstallBanner(mode) {
        if (!banner || isStandalone || wasDismissed) {
          return;
        }

        if (mode === "ios") {
          installTitle.textContent = "Adicione o Guia Salto ao iPhone";
          installText.textContent =
            'No Safari, toque em Compartilhar e escolha "Adicionar a Tela de Inicio".';
          installButton.textContent = "Entendi";
        } else {
          installTitle.textContent = "Instale o Guia Salto";
          installText.textContent = "Acesse o Busca Salto pela tela inicial, como um aplicativo.";
          installButton.textContent = "Instalar";
        }

        banner.dataset.installMode = mode;
        banner.hidden = false;
      }

      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }

      window.addEventListener("beforeinstallprompt", (event) => {
        event.preventDefault();
        deferredPrompt = event;
        showInstallBanner("android");
      });

      installButton?.addEventListener("click", async () => {
        if (banner?.dataset.installMode === "ios") {
          window.localStorage.setItem("buscaSaltoInstallDismissed", "1");
          hideInstallBanner();
          return;
        }

        if (!deferredPrompt) {
          return;
        }

        deferredPrompt.prompt();
        const choice = await deferredPrompt.userChoice;
        deferredPrompt = null;

        if (choice?.outcome === "accepted") {
          hideInstallBanner();
        }
      });

      dismissButton?.addEventListener("click", () => {
        window.localStorage.setItem("buscaSaltoInstallDismissed", "1");
        hideInstallBanner();
      });

      window.addEventListener("appinstalled", () => {
        window.localStorage.setItem("buscaSaltoInstalled", "1");
        hideInstallBanner();
      });

      if (isiOS && !isStandalone && !wasDismissed) {
        window.setTimeout(() => showInstallBanner("ios"), 1200);
      }
    })();
  </script>
