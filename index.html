<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Busca Salto - Buscador do Comércio Local</title>
  <meta name="description" content="Encontre comércios, serviços e profissionais de Salto/SP no Busca Salto." />
  <meta name="theme-color" content="#0B2A4A" />
  <style>
    :root{--azul:#0b2a4a;--azul-claro:#184c7d;--fundo:#f5f7fb;--texto:#152132;--muted:#5e6b7b;--card:#fff;--borda:#dfe7f1;--sombra:0 10px 24px rgba(7,26,44,.08);--radius:16px}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--texto);background:linear-gradient(180deg,#fdfefe 0%,var(--fundo) 35%)}.container{width:min(1100px,94%);margin:0 auto}header{padding:28px 0 16px}.brand{display:flex;align-items:center;gap:16px;margin-bottom:6px}.brand-logo{width:clamp(72px,11vw,110px);height:clamp(72px,11vw,110px);object-fit:cover;border-radius:20px;border:1px solid #c9d6e8;box-shadow:0 10px 20px rgba(11,42,74,.15);background:#fff}h1{margin:0;color:var(--azul);font-size:clamp(1.8rem,5vw,2.6rem);letter-spacing:0}.subtitle{margin:10px 0 0;color:var(--muted);font-size:1rem;line-height:1.45;max-width:60ch}.search-panel{margin:20px 0 14px;background:var(--card);border:1px solid var(--borda);border-radius:var(--radius);box-shadow:var(--sombra);padding:14px;display:grid;gap:10px}.search-input,select,button{width:100%;border-radius:12px;border:1px solid #c9d6e8;padding:14px;font-size:1rem;background:#fff;color:var(--texto)}.search-input:focus,select:focus,button:focus{outline:2px solid #bdd9ff;border-color:var(--azul-claro)}.actions{display:grid;grid-template-columns:1fr;gap:10px}.btn-clear{background:#eef3fa;border-color:#d0dceb;font-weight:600;cursor:pointer}.status{font-size:.95rem;color:var(--muted);margin:12px 2px;min-height:24px}.grid{display:grid;gap:14px;padding-bottom:28px}.card-grid{display:grid;grid-template-columns:1fr;gap:14px}.group-title{margin:10px 2px 8px;font-size:1rem;color:#375373}.card{background:var(--card);border:1px solid var(--borda);border-radius:var(--radius);box-shadow:var(--sombra);overflow:hidden;display:flex;flex-direction:column;transition:transform .2s ease}.card:hover{transform:translateY(-2px)}.card-top{position:relative;min-height:138px;background:linear-gradient(145deg,#dae8f8,#eef4fb)}.card-top img{width:100%;height:170px;object-fit:cover;display:block}.no-photo{height:170px;display:grid;place-content:center;color:#315379;font-weight:700;letter-spacing:.02em;background:radial-gradient(circle at 20% 20%,#c2d8f2 0 18%,transparent 19%),radial-gradient(circle at 80% 80%,#dce8f7 0 16%,transparent 17%),linear-gradient(135deg,#eaf2fc,#d7e7fa)}.card-body{padding:14px}.title-row{display:flex;align-items:start;justify-content:space-between;gap:8px;margin-bottom:8px}.card h2{margin:0;font-size:1.15rem;color:#0f2f52;letter-spacing:0}.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}.tag{padding:5px 9px;border-radius:999px;font-size:.74rem;font-weight:700;border:1px solid transparent}.tag.parceiro{background:#ebf3ff;color:#184c7d;border-color:#cadff7}.tag.destaque{background:#fff5d9;color:#8a6500;border-color:#f0d37e}.tag.top{background:#ffe9b8;color:#6f4a00;border-color:#f1c765}.tag.verificado{background:#e7f7ef;color:#166442;border-color:#bde6d2}.meta,.desc,.offer{margin:6px 0;font-size:.93rem;line-height:1.45;color:#32465f}.offer{background:#fff8e3;border:1px dashed #e7c15c;border-radius:10px;padding:8px;color:#7a5905;font-weight:600}.button-stack{display:grid;gap:8px;margin-top:12px}.button-row{display:grid;gap:8px}.primary-actions{grid-template-columns:repeat(2,minmax(0,1fr))}.secondary-actions{grid-template-columns:repeat(3,minmax(0,1fr))}.address-actions{grid-template-columns:1fr}.btn{min-width:0;border:0;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;gap:7px;text-align:center;text-decoration:none;font-weight:800;line-height:1;cursor:pointer;color:#fff;box-shadow:0 6px 14px rgba(15,47,82,.12);transition:transform .18s ease,filter .18s ease,box-shadow .18s ease}.btn span:not(.btn-icon){min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.btn:hover{transform:translateY(-1px);filter:brightness(1.04);box-shadow:0 9px 18px rgba(15,47,82,.16)}.primary-actions .btn{min-height:48px;padding:12px 12px;font-size:.93rem}.secondary-actions .btn{min-height:40px;padding:8px 10px;font-size:.72rem;gap:5px;border-radius:10px}.address-actions .btn{min-height:40px;padding:8px 12px;font-size:.78rem;border-radius:10px}.btn-icon{width:17px;height:17px;flex:0 0 17px;display:inline-flex;align-items:center;justify-content:center}.secondary-actions .btn-icon{width:14px;height:14px;flex-basis:14px}.address-actions .btn-icon{width:15px;height:15px;flex-basis:15px}.btn-icon svg{width:100%;height:100%;display:block;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}.btn-icon.brand-letter{font-size:1.05rem;font-weight:900;font-family:Arial,sans-serif;line-height:1}.btn.whatsapp{background:#25d366}.btn.telefone{background:#7c3aed}.btn.instagram{background:linear-gradient(135deg,#f58529 0%,#dd2a7b 45%,#8134af 75%,#515bd4 100%)}.btn.facebook{background:#1877f2}.btn.site{background:#0f766e}.btn.endereco{background:#e85d04}.btn.disabled,.btn.disabled:hover{background:#cbd5e1;color:#64748b;box-shadow:none;filter:none;transform:none;cursor:not-allowed}.btn.disabled .btn-icon{opacity:.78}.btn-claim{margin-top:8px;width:fit-content;max-width:100%;background:#f0f4fa;color:#4f6380;border:1px solid #d4dfed;border-radius:999px;padding:5px 10px;font-weight:600;font-size:.78rem;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;align-self:flex-start;opacity:.9}.btn-claim:hover{opacity:1;background:#e6edf7}.card-plano-gratuito{border:1px solid #dce3ea;box-shadow:none}.card-plano-gratuito .card-top,.card-plano-gratuito .offer,.card-plano-gratuito .tag.plano{display:none}.card-plano-parceiro{border:1px solid #b9d8ff;box-shadow:0 6px 18px rgba(24,76,125,.08)}.card-plano-destaque{border:2px solid #f3b323;box-shadow:0 8px 22px rgba(243,179,35,.18)}.card-plano-top{border:2px solid #d89b00;box-shadow:0 10px 26px rgba(216,155,0,.25);position:relative}.card-plano-top::before{content:"Top Busca Salto";position:absolute;top:10px;left:10px;background:linear-gradient(135deg,#ffe08a,#d89b00);color:#3b2a00;font-size:12px;font-weight:700;padding:6px 10px;border-radius:999px;z-index:2}.empty{background:#fff;border:1px dashed #c9d6e8;border-radius:12px;padding:16px;text-align:center;color:var(--muted)}footer{text-align:center;color:#5c6a7a;font-size:.92rem;padding:20px 0 28px}@media(max-width:679px){header{padding:18px 0 10px}.brand{gap:12px;margin-bottom:2px}.brand-logo{width:72px;height:72px;border-radius:16px}h1{font-size:2rem}.subtitle{margin-top:6px;font-size:.98rem;line-height:1.4}.search-panel{margin:14px 0 10px;padding:10px;gap:8px}.actions{gap:8px}.search-input,select,button{padding:12px}.btn-clear{background:transparent;border-style:dashed}.status{margin-top:8px}.card-body{padding:12px}}@media(min-width:680px){.actions{grid-template-columns:2fr 1fr 1fr auto}.btn-clear{min-width:150px}.card-grid{grid-template-columns:repeat(2,1fr)}}@media(min-width:1020px){.card-grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <header class="container"><div class="brand"><img class="brand-logo" src="imagens/logo.png" alt="Logo Busca Salto" /><h1>Busca Salto</h1></div><p class="subtitle">Encontre comércios, serviços e profissionais de Salto em um só lugar.</p></header>
  <main class="container"><section class="search-panel"><div class="actions"><input id="searchInput" class="search-input" type="search" placeholder="O que você procura em Salto?" aria-label="Buscar comércios" /><select id="categoryFilter" aria-label="Filtrar por categoria"><option value="">Todas as categorias</option></select><select id="bairroFilter" aria-label="Filtrar por bairro"><option value="">Todos os bairros</option></select><button id="clearFilters" class="btn-clear" type="button">Limpar filtros</button></div></section><p id="status" class="status">Carregando comércios...</p><section id="results" class="grid" aria-live="polite"></section></main>
  <footer class="container">Busca Salto - o buscador local da cidade.</footer>
  <script>
    const API_URL="/api/comercios";
    const PAGE_LIMIT=30;
    const BUSCA_SALTO_WHATSAPP="5511999999999";
    const UI_TEXTS={loading:"Carregando comércios...",loadError:"Não foi possível carregar os dados agora. Tente novamente em instantes.",emptyInitial:"Digite o que você procura ou explore as categorias e bairros.",emptyResult:"Nenhum resultado encontrado para os filtros selecionados."};
    const dom={searchInput:document.getElementById("searchInput"),categoryFilter:document.getElementById("categoryFilter"),bairroFilter:document.getElementById("bairroFilter"),clearFilters:document.getElementById("clearFilters"),status:document.getElementById("status"),results:document.getElementById("results")};
    let allItems=[],currentPage=1,currentTotal=0,currentHasMore=false,searchTimer=null,currentController=null;
    const normalize=(value="")=>value.toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
    function sanitizeWhatsApp(value=""){return value.replace(/\D/g,"")}
    function toInstagramUrl(value=""){const v=value.trim();if(!v)return"";if(v.startsWith("http://")||v.startsWith("https://"))return v;if(v.startsWith("@"))return`https://instagram.com/${v.slice(1)}`;return`https://instagram.com/${v}`}
    function toFacebookUrl(value=""){const v=value.trim();if(!v)return"";if(v.startsWith("http://")||v.startsWith("https://"))return v;return`https://facebook.com/${encodeURIComponent(v.replace(/^@/,""))}`}
    function toSiteUrl(value=""){const v=value.trim();if(!v)return"";if(v.startsWith("http://")||v.startsWith("https://"))return v;return`https://${v}`}
    function toPhoneUrl(value=""){const digits=value.replace(/\D/g,"");return digits?`tel:${digits}`:""}
    function toMapsUrl(value="",city=""){const address=value.trim();if(!address)return"";const query=city?`${address}, ${city}, Salto/SP`:`${address}, Salto/SP`;return`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`}
    function contactUrl(type,value){if(type==="whatsapp"){const digits=sanitizeWhatsApp(value);return digits?`https://wa.me/${digits}`:""}if(type==="telefone")return toPhoneUrl(value);if(type==="instagram")return toInstagramUrl(value);if(type==="facebook")return toFacebookUrl(value);if(type==="site")return toSiteUrl(value);return""}
    function buttonIcon(type){const icons={whatsapp:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19l1.1-3.8A7.6 7.6 0 1 1 9 18.1L5 19Z"/><path d="M9.5 8.8c.2-.4.4-.4.7-.4h.5c.2 0 .4.1.5.4l.7 1.6c.1.3.1.5-.1.7l-.4.5c-.1.2-.2.3-.1.5.4.8 1.1 1.5 2 2 .2.1.3.1.5-.1l.6-.7c.2-.2.4-.2.7-.1l1.5.7c.3.1.4.3.4.6 0 .7-.4 1.4-1 1.6-1.2.4-3.8-.5-5.6-2.3-1.8-1.8-2.7-4.3-2.3-5.5Z"/></svg>',telefone:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 16.9v2.7a2 2 0 0 1-2.2 2 19.6 19.6 0 0 1-8.5-3 19.2 19.2 0 0 1-5.9-5.9 19.6 19.6 0 0 1-3-8.5A2 2 0 0 1 4.4 2h2.7a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.8a2 2 0 0 1-.4 2.1L8.3 9.7a16 16 0 0 0 6 6l1.1-1.1a2 2 0 0 1 2.1-.4c.9.3 1.8.6 2.8.7a2 2 0 0 1 1.7 2Z"/></svg>',instagram:'<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><path d="M17.5 6.5h.01"/></svg>',facebook:'<span class="btn-icon brand-letter" aria-hidden="true">f</span>',site:'<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></svg>',endereco:'<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>'};const icon=icons[type]||"";return icon.startsWith("<span")?icon:`<span class="btn-icon">${icon}</span>`}
    function actionButton(type,href,label,options={}){const content=`${buttonIcon(type)}<span>${label}</span>`;if(!href)return`<span class="btn ${type} disabled" aria-disabled="true" title="${label} indisponível">${content}</span>`;const target=options.sameTab?"":' target="_blank" rel="noopener"';return`<a class="btn ${type}" href="${href}"${target}>${content}</a>`}
    function contactButton(type,item,label,options={}){const content=`${buttonIcon(type)}<span>${label}</span>`;if(!item[`has_${type}`])return`<span class="btn ${type} disabled" aria-disabled="true" title="${label} indisponível">${content}</span>`;const sameTab=options.sameTab?"1":"0";return`<button class="btn ${type}" type="button" data-contact-type="${type}" data-id="${item.id}" data-same-tab="${sameTab}">${content}</button>`}
    function normalizarPlano(plano){const p=String(plano||"").toLowerCase().trim();return["top","destaque","parceiro","gratuito"].includes(p)?p:"gratuito"}
    function renderFiltersData(filters){const categories=filters?.categorias||[],bairros=filters?.bairros||[];dom.categoryFilter.innerHTML='<option value="">Todas as categorias</option>'+categories.map(c=>`<option value="${c}">${c}</option>`).join("");dom.bairroFilter.innerHTML='<option value="">Todos os bairros</option>'+bairros.map(b=>`<option value="${b}">${b}</option>`).join("")}
    function badgeHTML(item){const plan=normalizarPlano(item.plano),tags=[];if(plan==="parceiro")tags.push('<span class="tag plano parceiro">Parceiro Busca Salto</span>');if(plan==="destaque")tags.push('<span class="tag plano destaque">Destaque Busca Salto</span>');if(plan==="top")tags.push('<span class="tag plano top">Top Categoria</span>');return tags.join("")}
    function cardClassByPlan(plan=""){return`card-plano-${normalizarPlano(plan)}`}
    function renderCards(items){if(!items.length){dom.results.innerHTML=`<div class="empty">${UI_TEXTS.emptyResult}</div>`;dom.status.textContent="0 resultados";return}const renderCard=item=>{const plano=normalizarPlano(item.plano),enderecoUrl=toMapsUrl(item.endereco||"",item.bairro||""),mostrarImagemGrande=plano!=="gratuito",mostrarOferta=plano==="top"||plano==="destaque",descricao=item.descricao?.trim(),descricaoCurta=descricao&&plano==="gratuito"?`${descricao.slice(0,120)}${descricao.length>120?"...":""}`:descricao,claimMessage=encodeURIComponent(`Olá, sou responsável pelo comércio ${item.nome} e gostaria de corrigir ou melhorar este cadastro no Busca Salto.`),primaryButtons=[contactButton("whatsapp",item,"WhatsApp"),contactButton("telefone",item,"Telefone",{sameTab:true})].join(""),secondaryButtons=[contactButton("instagram",item,"Instagram"),contactButton("facebook",item,"Facebook"),contactButton("site",item,"Site")].join(""),addressButton=actionButton("endereco",enderecoUrl,"Endereço"),buttonStack=`<div class="button-stack"><div class="button-row primary-actions">${primaryButtons}</div><div class="button-row secondary-actions">${secondaryButtons}</div><div class="button-row address-actions">${addressButton}</div></div>`;return `<article class="card ${cardClassByPlan(plano)}">${mostrarImagemGrande?`<div class="card-top">${item.foto_url?.trim()?`<img src="${item.foto_url}" alt="Foto de ${item.nome}" loading="lazy" />`:`<div class="no-photo">Busca Salto</div>`}</div>`:""}<div class="card-body"><div class="title-row"><h2>${item.nome||"Sem nome"}</h2></div><div class="tags">${badgeHTML(item)}</div><p class="meta"><strong>${item.categoria||"Categoria não informada"}</strong>${item.subcategoria?` • ${item.subcategoria}`:""}</p><p class="meta">📍 ${item.bairro||"Bairro não informado"}</p>${item.endereco?`<p class="meta">${item.endereco}</p>`:""}${descricaoCurta?`<p class="desc">${descricaoCurta}</p>`:""}${mostrarOferta&&item.oferta?`<p class="offer">🎁 ${item.oferta}</p>`:""}${buttonStack}<a class="btn-claim" href="https://wa.me/${BUSCA_SALTO_WHATSAPP}?text=${claimMessage}" target="_blank" rel="noopener">Sou responsável por este comércio</a></div></article>`};const parceiros=items.filter(item=>normalizarPlano(item.plano)!=="gratuito"),gratuitos=items.filter(item=>normalizarPlano(item.plano)==="gratuito"),grupos=[];if(parceiros.length)grupos.push(`<section><h3 class="group-title">Comércios parceiros</h3><div class="card-grid">${parceiros.map(renderCard).join("")}</div></section>`);if(gratuitos.length)grupos.push(`<section><h3 class="group-title">Cadastro gratuito</h3><div class="card-grid">${gratuitos.map(renderCard).join("")}</div></section>`);dom.results.innerHTML=grupos.join("");appendLoadMoreButton()}
    function updateStatus(){dom.status.textContent=`${allItems.length} de ${currentTotal} resultado${currentTotal!==1?"s":""} encontrado${currentTotal!==1?"s":""}.`}
    function appendLoadMoreButton(){if(!currentHasMore)return;const button=document.createElement("button");button.type="button";button.className="btn-clear";button.textContent="Carregar mais";button.addEventListener("click",()=>{currentPage+=1;fetchResults({reset:false})});dom.results.appendChild(button)}
    function buildQuery(page){const params=new URLSearchParams({page:String(page),limit:String(PAGE_LIMIT)});const busca=dom.searchInput.value.trim(),categoria=dom.categoryFilter.value,bairro=dom.bairroFilter.value;if(busca)params.set("busca",busca);if(categoria)params.set("categoria",categoria);if(bairro)params.set("bairro",bairro);return params.toString()}
    async function fetchResults({reset=true}={}){if(currentController)currentController.abort();currentController=new AbortController();if(reset){currentPage=1;allItems=[]}dom.status.textContent=UI_TEXTS.loading;try{const res=await fetch(`${API_URL}?${buildQuery(currentPage)}`,{cache:"no-store",signal:currentController.signal});if(!res.ok)throw new Error("Falha de rede");const data=await res.json();const incoming=(data.items||[]).map(item=>({...item,plano:item.tipo_exibicao||item.plano||"gratuito"}));allItems=reset?incoming:[...allItems,...incoming];currentTotal=Number(data.total)||0;currentHasMore=Boolean(data.hasMore);renderCards(allItems);updateStatus()}catch(error){if(error.name==="AbortError")return;dom.results.innerHTML=`<div class="empty">${UI_TEXTS.loadError}</div>`;dom.status.textContent=UI_TEXTS.loadError}}
    async function loadFilters(){const res=await fetch(`${API_URL}?mode=filters`,{cache:"no-store"});if(!res.ok)throw new Error("Falha de rede");const data=await res.json();renderFiltersData(data.filters)}
    async function openContact(button){const id=button.dataset.id,type=button.dataset.contactType;if(!id||!type)return;button.disabled=true;const oldText=button.innerHTML;const sameTab=button.dataset.sameTab==="1";const pendingWindow=sameTab?null:window.open("","_blank");try{const res=await fetch(`${API_URL}?mode=contact&id=${encodeURIComponent(id)}&tipo=${encodeURIComponent(type)}`,{cache:"no-store"});if(!res.ok)throw new Error("Falha de rede");const data=await res.json();const url=contactUrl(type,data.valor||"");if(!url)throw new Error("Contato indisponível");if(sameTab)window.location.href=url;else if(pendingWindow){pendingWindow.opener=null;pendingWindow.location.href=url}else window.open(url,"_blank","noopener")}catch(error){if(pendingWindow)pendingWindow.close();button.classList.add("disabled");button.title="Contato indisponível"}finally{button.disabled=false;button.innerHTML=oldText}}
    function scheduleSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(()=>fetchResults({reset:true}),450)}
    async function loadData(){try{dom.status.textContent=UI_TEXTS.loading;await loadFilters();await fetchResults({reset:true})}catch(error){dom.results.innerHTML=`<div class="empty">${UI_TEXTS.loadError}</div>`;dom.status.textContent=UI_TEXTS.loadError}}
    dom.searchInput.addEventListener("input",scheduleSearch);dom.categoryFilter.addEventListener("change",()=>fetchResults({reset:true}));dom.bairroFilter.addEventListener("change",()=>fetchResults({reset:true}));dom.clearFilters.addEventListener("click",()=>{dom.searchInput.value="";dom.categoryFilter.value="";dom.bairroFilter.value="";fetchResults({reset:true})});dom.results.addEventListener("click",event=>{const button=event.target.closest("button[data-contact-type]");if(button)openContact(button)});loadData();
  </script>
</body>
</html>
