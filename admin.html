<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Busca Salto - Admin</title>
  <style>
    :root{--azul:#0b2a4a;--texto:#17324f;--muted:#60738c;--fundo:#f5f7fb;--card:#fff;--borda:#d8e1ec;--ok:#0f766e;--erro:#b42318}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--fundo);color:var(--texto);display:grid;place-items:center;padding:24px}
    main{width:min(1100px,100%);background:var(--card);border:1px solid var(--borda);border-radius:8px;box-shadow:0 18px 42px rgba(11,42,74,.12);padding:22px}
    h1{margin:0 0 6px;color:var(--azul);font-size:1.35rem;letter-spacing:0}
    p{margin:0 0 18px;color:var(--muted);line-height:1.45}
    form{display:grid;gap:12px}
    .login{max-width:440px;margin:0 auto}
    label{display:grid;gap:6px;font-weight:700;color:var(--azul)}
    input,button{width:100%;border-radius:8px;border:1px solid var(--borda);padding:12px;font:inherit}
    input:focus,button:focus{outline:2px solid #bdd9ff;border-color:#5fa3e6}
    button{border:0;background:var(--azul);color:#fff;font-weight:800;cursor:pointer}
    button.secondary{background:#e8eef6;color:var(--azul);border:1px solid var(--borda)}
    button:disabled{opacity:.65;cursor:wait}
    .status{min-height:22px;margin-top:12px;font-size:.94rem;color:var(--muted)}
    .status.error{color:var(--erro)}
    .status.ok{color:var(--ok)}
    .panel{display:none;gap:12px}
    .panel.active{display:grid}
    .login.hidden{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .topbar h1{margin:0}
    .filters{display:grid;grid-template-columns:minmax(220px,1fr) 160px 160px 120px;gap:10px;margin-top:8px}
    .toolbar{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
    .toolbar button{width:auto;min-width:96px}
    .content-grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:14px;align-items:start}
    .table-wrap{overflow:auto;border:1px solid var(--borda);border-radius:8px}
    table{width:100%;border-collapse:collapse;min-width:920px}
    th,td{text-align:left;padding:10px;border-bottom:1px solid #edf1f6;font-size:.9rem;vertical-align:top}
    th{background:#f6f8fb;color:var(--azul);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
    tr:last-child td{border-bottom:0}
    .muted{color:var(--muted)}
    .pill{display:inline-block;padding:3px 7px;border-radius:999px;background:#eef3fa;color:#294866;font-size:.78rem;font-weight:700}
    .empty{padding:16px;color:var(--muted)}
    .editor{border:1px solid var(--borda);border-radius:8px;padding:12px;background:#fbfcfe}
    .editor h2{margin:0 0 10px;color:var(--azul);font-size:1rem}
    .editor-grid{display:grid;gap:9px}
    .editor label{font-size:.82rem}
    .editor input,.editor select,.editor textarea{padding:9px;border-radius:7px;border:1px solid var(--borda);font:inherit;width:100%}
    .editor textarea{min-height:84px;resize:vertical}
    .editor-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .upload-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
    .media-group{display:grid;gap:8px;border:1px solid #e4ebf4;border-radius:8px;padding:10px;background:#fff}
    .media-group legend,.media-title{font-weight:800;color:var(--azul);font-size:.82rem}
    .media-actions{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:end}
    .media-actions button{width:auto;min-width:82px}
    .danger{background:#fee4e2!important;color:#9f1f17!important;border:1px solid #f8b4ae!important}
    .sponsor-panel{border:1px solid var(--borda);border-radius:8px;padding:12px;background:#fff}
    .sponsor-panel h2{margin:0 0 10px;color:var(--azul);font-size:1rem}
    .sponsor-grid{display:grid;grid-template-columns:360px minmax(0,1fr);gap:14px;align-items:start}
    .sponsor-form{display:grid;gap:9px}
    .sponsor-form label{font-size:.82rem}
    .sponsor-form input,.sponsor-form select{padding:9px;border-radius:7px;border:1px solid var(--borda);font:inherit;width:100%}
    .row-action{width:auto;padding:7px 9px;background:#e8eef6;color:var(--azul);border:1px solid var(--borda);font-size:.8rem}
    @media(max-width:960px){.content-grid,.sponsor-grid{grid-template-columns:1fr}}
    @media(max-width:760px){body{place-items:start;padding:12px}main{padding:16px}.filters{grid-template-columns:1fr}.toolbar{justify-content:stretch}.toolbar button{width:100%}}
  </style>
</head>
<body>
  <main>
    <section id="loginBox" class="login">
      <h1>Busca Salto Admin</h1>
      <p>Acesso privado para gestao do projeto.</p>
      <form id="loginForm">
        <label>
          Senha
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </label>
        <button id="loginButton" type="submit">Entrar</button>
      </form>
      <div id="loginStatus" class="status" role="status"></div>
    </section>

    <section id="adminPanel" class="panel">
      <div class="topbar">
        <div>
          <h1>Painel administrativo</h1>
          <p id="summary">Carregando comercios...</p>
        </div>
        <div class="toolbar">
          <button id="refreshButton" class="secondary" type="button">Atualizar</button>
          <button id="logoutButton" class="secondary" type="button">Sair</button>
        </div>
      </div>
      <form id="filtersForm" class="filters">
        <input id="adminSearch" name="busca" type="search" placeholder="Buscar comercio, bairro, contato..." autocomplete="off" />
        <select id="statusFilter" name="status">
          <option value="">Status</option>
          <option value="ativo">Ativo</option>
          <option value="inativo">Inativo</option>
          <option value="pendente">Pendente</option>
        </select>
        <select id="planFilter" name="plano">
          <option value="">Plano</option>
          <option value="gratuito">Gratuito</option>
          <option value="parceiro">Parceiro</option>
          <option value="destaque">Destaque</option>
          <option value="top">Top</option>
        </select>
        <button id="filterButton" type="submit">Filtrar</button>
      </form>
      <div class="content-grid">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Comercio</th>
                <th>Categoria</th>
                <th>Bairro</th>
                <th>Contato</th>
                <th>Plano</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="commerceRows"></tbody>
          </table>
        </div>
        <aside class="editor">
          <h2 id="editorTitle">Novo comercio</h2>
          <form id="commerceForm" class="editor-grid">
            <input id="commerceId" name="id" type="hidden" />
            <label>Nome<input name="nome" required maxlength="140" /></label>
            <label>Categoria<input name="categoria" maxlength="80" /></label>
            <label>Subcategoria<input name="subcategoria" maxlength="180" /></label>
            <label>Bairro<input name="bairro" maxlength="80" /></label>
            <label>Endereco<input name="endereco" maxlength="180" /></label>
            <label>WhatsApp<input name="whatsapp" maxlength="40" /></label>
            <label>Telefone<input name="telefone" maxlength="40" /></label>
            <label>Instagram<input name="instagram" maxlength="120" /></label>
            <label>Facebook<input name="facebook" maxlength="180" /></label>
            <label>Site<input name="site" maxlength="180" /></label>
            <label>Plano<select name="plano"><option value="gratuito">gratuito</option><option value="parceiro">parceiro</option><option value="destaque">destaque</option><option value="top">top</option></select></label>
            <label>Status<input name="status" maxlength="40" value="ativo" /></label>
            <label>Prioridade<input name="prioridade" inputmode="numeric" maxlength="5" value="0" /></label>
            <label>Verificado<input name="verificado" maxlength="20" /></label>
            <label>Oferta<input name="oferta" maxlength="180" /></label>
            <fieldset class="media-group">
              <legend>Fotos do comercio</legend>
              <label>Foto 1 URL<input id="fotoUrlInput" name="foto_url" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo foto 1<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="foto_url" /></label>
                <button class="secondary" type="button" data-upload-kind="comercio" data-upload-target="foto_url">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="foto_url">Remover</button>
              </div>
              <label>Foto 2 URL<input name="foto_url_2" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo foto 2<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="foto_url_2" /></label>
                <button class="secondary" type="button" data-upload-kind="comercio" data-upload-target="foto_url_2">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="foto_url_2">Remover</button>
              </div>
              <label>Foto 3 URL<input name="foto_url_3" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo foto 3<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="foto_url_3" /></label>
                <button class="secondary" type="button" data-upload-kind="comercio" data-upload-target="foto_url_3">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="foto_url_3">Remover</button>
              </div>
              <label>Foto 4 URL<input name="foto_url_4" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo foto 4<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="foto_url_4" /></label>
                <button class="secondary" type="button" data-upload-kind="comercio" data-upload-target="foto_url_4">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="foto_url_4">Remover</button>
              </div>
              <label>Foto 5 URL<input name="foto_url_5" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo foto 5<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="foto_url_5" /></label>
                <button class="secondary" type="button" data-upload-kind="comercio" data-upload-target="foto_url_5">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="foto_url_5">Remover</button>
              </div>
            </fieldset>
            <label>Descricao<textarea name="descricao" maxlength="700"></textarea></label>
            <label>Palavras-chave<textarea name="palavras_chave" maxlength="400"></textarea></label>
            <div class="editor-actions">
              <button id="saveCommerceButton" type="submit">Salvar</button>
              <button id="newCommerceButton" class="secondary" type="button">Novo</button>
            </div>
          </form>
        </aside>
      </div>
      <section class="sponsor-panel">
        <h2>Patrocinadores</h2>
        <div class="sponsor-grid">
          <form id="sponsorForm" class="sponsor-form">
            <input id="sponsorId" name="id" type="hidden" />
            <label>Nome<input name="nome" required maxlength="120" /></label>
            <fieldset class="media-group">
              <legend>Banners desktop</legend>
              <label>Desktop 1 URL<input id="sponsorImageUrl" name="imagem_url" maxlength="500" placeholder="Obrigatorio para aparecer no site" /></label>
              <div class="media-actions">
                <label>Arquivo desktop 1<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_url" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_url">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_url">Remover</button>
              </div>
              <label>Desktop 2 URL<input name="imagem_desktop_2" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo desktop 2<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_desktop_2" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_desktop_2">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_desktop_2">Remover</button>
              </div>
              <label>Desktop 3 URL<input name="imagem_desktop_3" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo desktop 3<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_desktop_3" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_desktop_3">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_desktop_3">Remover</button>
              </div>
              <label>Desktop 4 URL<input name="imagem_desktop_4" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo desktop 4<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_desktop_4" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_desktop_4">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_desktop_4">Remover</button>
              </div>
              <label>Desktop 5 URL<input name="imagem_desktop_5" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo desktop 5<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_desktop_5" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_desktop_5">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_desktop_5">Remover</button>
              </div>
            </fieldset>
            <fieldset class="media-group">
              <legend>Banners smartphone</legend>
              <label>Smartphone 1 URL<input name="imagem_mobile_1" maxlength="500" placeholder="Se vazio, usa o desktop" /></label>
              <div class="media-actions">
                <label>Arquivo smartphone 1<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_mobile_1" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_mobile_1">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_mobile_1">Remover</button>
              </div>
              <label>Smartphone 2 URL<input name="imagem_mobile_2" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo smartphone 2<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_mobile_2" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_mobile_2">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_mobile_2">Remover</button>
              </div>
              <label>Smartphone 3 URL<input name="imagem_mobile_3" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo smartphone 3<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_mobile_3" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_mobile_3">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_mobile_3">Remover</button>
              </div>
              <label>Smartphone 4 URL<input name="imagem_mobile_4" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo smartphone 4<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_mobile_4" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_mobile_4">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_mobile_4">Remover</button>
              </div>
              <label>Smartphone 5 URL<input name="imagem_mobile_5" maxlength="500" /></label>
              <div class="media-actions">
                <label>Arquivo smartphone 5<input type="file" accept="image/jpeg,image/png,image/webp" data-file-target="imagem_mobile_5" /></label>
                <button class="secondary" type="button" data-upload-kind="patrocinador" data-upload-target="imagem_mobile_5">Enviar</button>
                <button class="secondary danger" type="button" data-clear-target="imagem_mobile_5">Remover</button>
              </div>
            </fieldset>
            <label>Link<input name="link_url" maxlength="500" /></label>
            <label>Status<select name="status"><option value="ativo">ativo</option><option value="inativo">inativo</option></select></label>
            <label>Ordem<input name="ordem" inputmode="numeric" maxlength="5" value="0" /></label>
            <label>Inicio<input name="inicio" type="date" /></label>
            <label>Fim<input name="fim" type="date" /></label>
            <label>Texto alternativo<input name="texto_alt" maxlength="160" /></label>
            <div class="editor-actions">
              <button id="saveSponsorButton" type="submit">Salvar</button>
              <button id="newSponsorButton" class="secondary" type="button">Novo</button>
            </div>
          </form>
          <div class="table-wrap">
            <table>
              <thead><tr><th>ID</th><th>Nome</th><th>Status</th><th>Ordem</th><th>Periodo</th><th></th></tr></thead>
              <tbody id="sponsorRows"></tbody>
            </table>
          </div>
        </div>
      </section>
      <div id="panelStatus" class="status" role="status"></div>
    </section>
  </main>

  <script>
    const loginBox = document.getElementById("loginBox");
    const adminPanel = document.getElementById("adminPanel");
    const loginForm = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");
    const loginButton = document.getElementById("loginButton");
    const logoutButton = document.getElementById("logoutButton");
    const refreshButton = document.getElementById("refreshButton");
    const filtersForm = document.getElementById("filtersForm");
    const commerceRows = document.getElementById("commerceRows");
    const commerceForm = document.getElementById("commerceForm");
    const commerceId = document.getElementById("commerceId");
    const editorTitle = document.getElementById("editorTitle");
    const newCommerceButton = document.getElementById("newCommerceButton");
    const saveCommerceButton = document.getElementById("saveCommerceButton");
    const fotoUrlInput = document.getElementById("fotoUrlInput");
    const sponsorForm = document.getElementById("sponsorForm");
    const sponsorId = document.getElementById("sponsorId");
    const sponsorRows = document.getElementById("sponsorRows");
    const sponsorImageUrl = document.getElementById("sponsorImageUrl");
    const saveSponsorButton = document.getElementById("saveSponsorButton");
    const newSponsorButton = document.getElementById("newSponsorButton");
    const summary = document.getElementById("summary");
    const loginStatus = document.getElementById("loginStatus");
    const panelStatus = document.getElementById("panelStatus");
    const GOOGLE_OAUTH_CLIENT_ID = "782984878308-t95veqip64rl7t9gqam5dn4p9mm30qbq.apps.googleusercontent.com";
    const GOOGLE_DRIVE_SCOPE = "https://www.googleapis.com/auth/drive.file";
    const GOOGLE_DRIVE_FOLDERS = {
      comercio: "1SI56xKqxzdxLEgu72Q1G-NL00LuOAPNA",
      patrocinador: "18rKSfu38PHR8NCda6j3V6BS99kuT9NU7",
      pendente: "1ZWoxvbRLi0wN1utVI1KS4aZqW8CsfbCp",
    };
    let filterTimer = null;
    let googleTokenClient = null;
    let googleAccessToken = "";
    let googleIdentityScriptPromise = null;

    function showPanel() {
      loginBox.classList.add("hidden");
      adminPanel.classList.add("active");
      panelStatus.textContent = "";
      loadComercios();
      loadSponsors();
    }

    function showLogin(message = "") {
      adminPanel.classList.remove("active");
      loginBox.classList.remove("hidden");
      loginStatus.textContent = message;
      loginStatus.className = message ? "status error" : "status";
    }

    async function checkSession() {
      const response = await fetch("/api/admin/session", { cache: "no-store", credentials: "same-origin" });
      const data = await response.json();
      if (data.ok) return showPanel();
      if (data.configured === false) return showLogin("Painel ainda nao configurado no servidor.");
      return showLogin();
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[char]));
    }

    function contactSummary(item) {
      const contacts = [
        item.whatsapp && `WA ${item.whatsapp}`,
        item.telefone && `Tel ${item.telefone}`,
        item.instagram && `IG ${item.instagram}`,
        item.site && "Site",
      ].filter(Boolean);
      return contacts.length ? contacts.join("<br>") : '<span class="muted">Sem contato</span>';
    }

    function renderComercios(data) {
      summary.textContent = `${data.total} comercio${data.total === 1 ? "" : "s"} encontrado${data.total === 1 ? "" : "s"}.`;
      if (!data.items.length) {
        commerceRows.innerHTML = '<tr><td colspan="8" class="empty">Nenhum cadastro encontrado.</td></tr>';
        window.currentComercios = [];
        return;
      }
      commerceRows.innerHTML = data.items.map((item) => `
        <tr data-id="${escapeHtml(item.id)}">
          <td>${escapeHtml(item.id)}<br><span class="muted">Linha ${escapeHtml(item.rowNumber)}</span></td>
          <td><strong>${escapeHtml(item.nome || "Sem nome")}</strong><br><span class="muted">${escapeHtml(item.endereco)}</span></td>
          <td>${escapeHtml(item.categoria)}<br><span class="muted">${escapeHtml(item.subcategoria)}</span></td>
          <td>${escapeHtml(item.bairro)}</td>
          <td>${contactSummary(item)}</td>
          <td><span class="pill">${escapeHtml(item.plano)}</span></td>
          <td>${escapeHtml(item.status)}</td>
          <td>
            <button class="row-action" type="button" data-edit-id="${escapeHtml(item.id)}">Editar</button>
            <button class="row-action danger" type="button" data-delete-id="${escapeHtml(item.id)}">Excluir</button>
          </td>
        </tr>
      `).join("");
      window.currentComercios = data.items;
    }

    async function loadComercios() {
      panelStatus.textContent = "Carregando...";
      panelStatus.className = "status";
      const params = new URLSearchParams(new FormData(filtersForm));
      params.set("limit", "50");
      try {
        const response = await fetch(`/api/admin/comercios?${params}`, { cache: "no-store", credentials: "same-origin" });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || "Falha ao carregar.");
        renderComercios(data);
        panelStatus.textContent = data.hasMore ? "Mostrando os primeiros 50 resultados." : "";
      } catch (error) {
        panelStatus.textContent = error.message || "Nao foi possivel carregar.";
        panelStatus.className = "status error";
      }
    }

    function setFormItem(item = {}) {
      editorTitle.textContent = item.id ? `Editar ${item.id}` : "Novo comercio";
      commerceForm.reset();
      commerceId.value = item.id || "";
      for (const field of commerceForm.elements) {
        if (!field.name || field.name === "id") continue;
        field.value = item[field.name] || (field.name === "status" ? "ativo" : field.name === "prioridade" ? "0" : "");
      }
    }

    function setSponsorItem(item = {}) {
      sponsorForm.reset();
      sponsorId.value = item.id || "";
      for (const field of sponsorForm.elements) {
        if (!field.name || field.name === "id") continue;
        field.value = item[field.name] || (field.name === "status" ? "ativo" : field.name === "ordem" ? "0" : "");
      }
    }

    function renderSponsors(data) {
      if (!data.items.length) {
        sponsorRows.innerHTML = '<tr><td colspan="6" class="empty">Nenhum patrocinador cadastrado.</td></tr>';
        window.currentSponsors = [];
        return;
      }
      sponsorRows.innerHTML = data.items.map((item) => `
        <tr>
          <td>${escapeHtml(item.id)}</td>
          <td><strong>${escapeHtml(item.nome)}</strong><br><span class="muted">${escapeHtml(item.link_url)}</span></td>
          <td>${escapeHtml(item.status)}</td>
          <td>${escapeHtml(item.ordem)}</td>
          <td>${escapeHtml(item.inicio)} ${item.fim ? `ate ${escapeHtml(item.fim)}` : ""}</td>
          <td>
            <button class="row-action" type="button" data-sponsor-id="${escapeHtml(item.id)}">Editar</button>
            <button class="row-action danger" type="button" data-delete-sponsor-id="${escapeHtml(item.id)}">Excluir</button>
          </td>
        </tr>
      `).join("");
      window.currentSponsors = data.items;
    }

    async function loadSponsors() {
      try {
        const response = await fetch("/api/admin/patrocinadores", { cache: "no-store", credentials: "same-origin" });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || "Falha ao carregar patrocinadores.");
        renderSponsors(data);
      } catch (error) {
        sponsorRows.innerHTML = `<tr><td colspan="6" class="empty">${escapeHtml(error.message || "Erro ao carregar.")}</td></tr>`;
      }
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginButton.disabled = true;
      loginStatus.textContent = "Validando...";
      loginStatus.className = "status";

      try {
        const response = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({ password: passwordInput.value }),
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.error || "Falha no login.");
        passwordInput.value = "";
        showPanel();
      } catch (error) {
        loginStatus.textContent = error.message || "Nao foi possivel entrar.";
        loginStatus.className = "status error";
      } finally {
        loginButton.disabled = false;
      }
    });

    logoutButton.addEventListener("click", async () => {
      await fetch("/api/admin/logout", { method: "POST", credentials: "same-origin" });
      showLogin();
    });

    commerceRows.addEventListener("click", (event) => {
      const deleteButton = event.target.closest("[data-delete-id]");
      if (deleteButton) {
        deleteCommerce(deleteButton.dataset.deleteId);
        return;
      }
      const button = event.target.closest("[data-edit-id]");
      if (!button) return;
      const item = (window.currentComercios || []).find((entry) => String(entry.id) === String(button.dataset.editId));
      if (item) setFormItem(item);
    });

    newCommerceButton.addEventListener("click", () => setFormItem());
    newSponsorButton.addEventListener("click", () => setSponsorItem());

    sponsorRows.addEventListener("click", (event) => {
      const deleteButton = event.target.closest("[data-delete-sponsor-id]");
      if (deleteButton) {
        deleteSponsor(deleteButton.dataset.deleteSponsorId);
        return;
      }
      const button = event.target.closest("[data-sponsor-id]");
      if (!button) return;
      const item = (window.currentSponsors || []).find((entry) => String(entry.id) === String(button.dataset.sponsorId));
      if (item) setSponsorItem(item);
    });

    async function deleteCommerce(id) {
      const item = (window.currentComercios || []).find((entry) => String(entry.id) === String(id));
      if (!confirm(`Excluir o comercio "${item?.nome || id}" do site? A linha sera marcada como excluida.`)) return;
      panelStatus.textContent = "Excluindo comercio...";
      panelStatus.className = "status";
      try {
        const response = await fetch(`/api/admin/comercios?id=${encodeURIComponent(id)}`, {
          method: "DELETE",
          credentials: "same-origin",
        });
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.error || "Falha ao excluir.");
        panelStatus.textContent = "Comercio marcado como excluido.";
        panelStatus.className = "status ok";
        await loadComercios();
      } catch (error) {
        panelStatus.textContent = error.message || "Nao foi possivel excluir.";
        panelStatus.className = "status error";
      }
    }

    async function deleteSponsor(id) {
      const item = (window.currentSponsors || []).find((entry) => String(entry.id) === String(id));
      if (!confirm(`Excluir o patrocinador "${item?.nome || id}" do site? A linha sera marcada como excluida.`)) return;
      panelStatus.textContent = "Excluindo patrocinador...";
      panelStatus.className = "status";
      try {
        const response = await fetch(`/api/admin/patrocinadores?id=${encodeURIComponent(id)}`, {
          method: "DELETE",
          credentials: "same-origin",
        });
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.error || "Falha ao excluir.");
        panelStatus.textContent = "Patrocinador marcado como excluido.";
        panelStatus.className = "status ok";
        await loadSponsors();
      } catch (error) {
        panelStatus.textContent = error.message || "Nao foi possivel excluir.";
        panelStatus.className = "status error";
      }
    }

    commerceForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      saveCommerceButton.disabled = true;
      panelStatus.textContent = "Salvando...";
      panelStatus.className = "status";
      const data = Object.fromEntries(new FormData(commerceForm).entries());
      const isEdit = Boolean(data.id);

      try {
        const response = await fetch(isEdit ? `/api/admin/comercios?id=${encodeURIComponent(data.id)}` : "/api/admin/comercios", {
          method: isEdit ? "PUT" : "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify(data),
        });
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.error || "Falha ao salvar.");
        panelStatus.textContent = "Cadastro salvo.";
        panelStatus.className = "status ok";
        setFormItem(result.item);
        await loadComercios();
      } catch (error) {
        panelStatus.textContent = error.message || "Nao foi possivel salvar.";
        panelStatus.className = "status error";
      } finally {
        saveCommerceButton.disabled = false;
      }
    });

    function safeFileBase(value = "") {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 120) || "imagem";
    }

    function fileExtension(file) {
      const byType = { "image/jpeg": "jpg", "image/png": "png", "image/webp": "webp" };
      return byType[file.type] || safeFileBase(file.name).split(".").pop() || "jpg";
    }

    function ensureImageFile(file) {
      if (!["image/jpeg", "image/png", "image/webp"].includes(file.type)) {
        throw new Error("Tipo de imagem nao permitido.");
      }
      if (!file.size || file.size > 3 * 1024 * 1024) {
        throw new Error("Imagem vazia ou maior que 3 MB.");
      }
    }

    function loadGoogleIdentityScript() {
      if (window.google?.accounts?.oauth2) return Promise.resolve();
      if (googleIdentityScriptPromise) return googleIdentityScriptPromise;
      googleIdentityScriptPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = "https://accounts.google.com/gsi/client";
        script.async = true;
        script.defer = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error("Nao foi possivel carregar o login do Google."));
        document.head.appendChild(script);
      });
      return googleIdentityScriptPromise;
    }

    async function getGoogleDriveToken() {
      await loadGoogleIdentityScript();
      if (googleAccessToken) return googleAccessToken;
      return new Promise((resolve, reject) => {
        googleTokenClient = google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_OAUTH_CLIENT_ID,
          scope: GOOGLE_DRIVE_SCOPE,
          callback: (response) => {
            if (response?.error) return reject(new Error("Autorizacao do Google Drive cancelada."));
            googleAccessToken = response.access_token;
            resolve(googleAccessToken);
          },
        });
        googleTokenClient.requestAccessToken({ prompt: "consent" });
      });
    }

    async function driveFetch(url, options = {}) {
      const token = await getGoogleDriveToken();
      const response = await fetch(url, {
        ...options,
        headers: {
          Authorization: `Bearer ${token}`,
          ...(options.headers || {}),
        },
      });
      if (response.status === 401) {
        googleAccessToken = "";
      }
      return response;
    }

    async function uploadImageFor(kind, file, extra = {}) {
      ensureImageFile(file);
      const folderId = GOOGLE_DRIVE_FOLDERS[kind] || GOOGLE_DRIVE_FOLDERS.comercio;
      const name = [
        safeFileBase(extra.commerceId || "novo"),
        safeFileBase(extra.commerceName || file.name),
        Date.now(),
      ].join("-") + `.${fileExtension(file)}`;
      const metadata = { name, parents: [folderId] };
      const boundary = `busca_salto_${Date.now()}`;
      const body = new Blob([
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n`,
        JSON.stringify(metadata),
        `\r\n--${boundary}\r\nContent-Type: ${file.type}\r\n\r\n`,
        file,
        `\r\n--${boundary}--`,
      ], { type: `multipart/related; boundary=${boundary}` });

      const createResponse = await driveFetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink", {
        method: "POST",
        headers: { "Content-Type": `multipart/related; boundary=${boundary}` },
        body,
      });
      const created = await createResponse.json().catch(() => ({}));
      if (!createResponse.ok || !created.id) {
        throw new Error(created.error?.message || "Nao foi possivel enviar a imagem para o Drive.");
      }

      const permissionResponse = await driveFetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(created.id)}/permissions`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ role: "reader", type: "anyone" }),
      });
      if (!permissionResponse.ok) {
        throw new Error("Imagem enviada, mas nao foi possivel torna-la publica.");
      }

      return `https://drive.google.com/thumbnail?id=${encodeURIComponent(created.id)}&sz=w1000`;
    }

    function inputByName(form, name) {
      return Array.from(form.elements).find((field) => field.name === name);
    }

    function fileInputByTarget(target) {
      return Array.from(document.querySelectorAll("[data-file-target]")).find((input) => input.dataset.fileTarget === target);
    }

    async function handleImageUpload(button) {
      const target = button.dataset.uploadTarget;
      const kind = button.dataset.uploadKind || "comercio";
      const form = kind === "patrocinador" ? sponsorForm : commerceForm;
      const field = inputByName(form, target);
      const fileInput = fileInputByTarget(target);
      const file = fileInput?.files && fileInput.files[0];
      if (!field) {
        panelStatus.textContent = "Campo de imagem nao encontrado.";
        panelStatus.className = "status error";
        return;
      }
      if (!file) {
        panelStatus.textContent = "Selecione uma imagem.";
        panelStatus.className = "status error";
        return;
      }

      button.disabled = true;
      panelStatus.textContent = "Enviando imagem...";
      panelStatus.className = "status";
      try {
        const formData = Object.fromEntries(new FormData(form).entries());
        field.value = await uploadImageFor(kind, file, {
          commerceId: formData.id || "novo",
          commerceName: formData.nome || file.name,
        });
        panelStatus.textContent = "Imagem enviada.";
        panelStatus.className = "status ok";
      } catch (error) {
        panelStatus.textContent = error.message || "Nao foi possivel enviar.";
        panelStatus.className = "status error";
      } finally {
        button.disabled = false;
      }
    }

    function clearImageField(target) {
      const field = inputByName(commerceForm, target) || inputByName(sponsorForm, target);
      const fileInput = fileInputByTarget(target);
      if (field) field.value = "";
      if (fileInput) fileInput.value = "";
      panelStatus.textContent = "Imagem removida do cadastro. Salve para confirmar.";
      panelStatus.className = "status ok";
    }

    adminPanel.addEventListener("click", (event) => {
      const uploadButton = event.target.closest("[data-upload-target]");
      if (uploadButton) {
        handleImageUpload(uploadButton);
        return;
      }
      const clearButton = event.target.closest("[data-clear-target]");
      if (clearButton) {
        clearImageField(clearButton.dataset.clearTarget);
      }
    });

    sponsorForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      saveSponsorButton.disabled = true;
      panelStatus.textContent = "Salvando patrocinador...";
      panelStatus.className = "status";
      const data = Object.fromEntries(new FormData(sponsorForm).entries());
      const isEdit = Boolean(data.id);
      try {
        const response = await fetch(isEdit ? `/api/admin/patrocinadores?id=${encodeURIComponent(data.id)}` : "/api/admin/patrocinadores", {
          method: isEdit ? "PUT" : "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify(data),
        });
        const result = await response.json();
        if (!response.ok || !result.ok) throw new Error(result.error || "Falha ao salvar patrocinador.");
        panelStatus.textContent = "Patrocinador salvo.";
        panelStatus.className = "status ok";
        setSponsorItem(result.item);
        await loadSponsors();
      } catch (error) {
        panelStatus.textContent = error.message || "Nao foi possivel salvar.";
        panelStatus.className = "status error";
      } finally {
        saveSponsorButton.disabled = false;
      }
    });

    refreshButton.addEventListener("click", loadComercios);
    filtersForm.addEventListener("submit", (event) => {
      event.preventDefault();
      loadComercios();
    });
    filtersForm.addEventListener("input", () => {
      clearTimeout(filterTimer);
      filterTimer = setTimeout(loadComercios, 350);
    });

    checkSession().catch(() => showLogin("Nao foi possivel verificar a sessao."));
    setFormItem();
    setSponsorItem();
  </script>
</body>
</html>
